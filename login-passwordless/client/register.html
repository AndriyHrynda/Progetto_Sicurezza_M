<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrazione  Passwordless</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1 class="title">🔐 Registrazione</h1>
      <p class="subtitle">Crea il tuo account in modo sicuro</p>
      
      <form id="form">
        <label for="email" class="label">Inserisci la tua email</label>
        <input
          id="email"
          name="email"
          type="email"
          required
          placeholder="Inserisci la tua email"
          class="input"
        />
        <button class="button">Registrati</button>
        <p id="message" class="subtitle"></p>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
